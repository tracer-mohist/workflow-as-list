# .pre-commit-config.yaml
# Pre-commit configuration
# REFERENCE: https://pre-commit.com
# NOTE: Run `pre-commit install` to enable git hooks

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
