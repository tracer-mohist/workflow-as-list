name: Bug Report
description: Report an error or unexpected behavior
title: "[BUG]: "
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        ## Bug Report
        
        Thanks for reporting this issue.
        
        Before submitting:
        - Search existing issues to avoid duplicates
        - Try to reproduce in the latest version

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What is the bug?
      placeholder: Describe the bug in 1-2 sentences
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
      description: How do we reproduce this?
      placeholder: |
        1. Run '...'
        2. Click '...'
        3. See error '...'
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected vs Actual
      description: What did you expect? What happened?
      placeholder: |
        Expected: ...
        Actual: ...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Your runtime environment
      render: bash
      placeholder: |
        OS: ...
        Version: ...
        Runtime: ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant logs or stack traces
      render: bash
      placeholder: Paste full error output
    validations:
      required: false

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How severe is this?
      options:
        - Critical
        - High
        - Medium
        - Low
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: Acknowledgements
      options:
        - label: I searched existing issues
          required: true
        - label: I provided enough info to reproduce
          required: true
